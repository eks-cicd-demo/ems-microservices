<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Employee Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>body{background:#f5f7fb}.card{border:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="d-none">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width:380px">
      <h4 class="mb-1 text-center"><i class="bi bi-people-fill text-primary"></i> EMS</h4>
      <p class="text-muted text-center small mb-3">Employee Management System</p>
      <ul class="nav nav-pills nav-fill mb-3" id="authTabs">
        <li class="nav-item"><a class="nav-link active" data-tab="signin" href="#">Sign in</a></li>
        <li class="nav-item"><a class="nav-link" data-tab="signup" href="#">Sign up</a></li>
      </ul>
      <form id="signinForm">
        <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>
        <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
      <form id="signupForm" class="d-none">
        <input class="form-control mb-2" name="full_name" placeholder="Full name" required>
        <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>
        <input class="form-control mb-2" type="password" name="password" minlength="6" placeholder="Password (min 6)" required>
        <button class="btn btn-primary w-100">Create account</button>
      </form>
      <div id="authMsg" class="small text-danger mt-2"></div>
      <p class="text-muted small text-center mt-3 mb-0">Default admin: admin@example.com / admin123</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appView" class="d-none">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand"><i class="bi bi-people-fill text-primary"></i> EMS</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span id="whoami" class="text-muted small"></span>
        <span id="roleBadge" class="badge text-bg-primary d-none">Admin</span>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-box-arrow-right"></i> Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <!-- stats -->
    <div class="row g-3 mb-4" id="statsRow"></div>

    <!-- tabs -->
    <ul class="nav nav-tabs" id="mainTabs">
      <li class="nav-item"><a class="nav-link active" data-view="employees" href="#">Employees</a></li>
      <li class="nav-item admin-only d-none"><a class="nav-link" data-view="admin" href="#">Users &amp; Roles</a></li>
    </ul>

    <!-- employees -->
    <div id="employeesView" class="card p-3 mt-0 rounded-top-0">
      <div class="d-flex gap-2 mb-3">
        <input id="searchInput" class="form-control" placeholder="Search name, email, position, department…">
        <button class="btn btn-primary admin-only d-none" data-bs-toggle="modal" data-bs-target="#empModal" id="addEmpBtn"><i class="bi bi-plus-lg"></i> Add</button>
      </div>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Name</th><th>Email</th><th>Position</th><th>Department</th><th>Salary</th><th>Hire date</th><th class="admin-only d-none text-end">Actions</th></tr></thead>
          <tbody id="empBody"><tr><td colspan="7" class="text-center text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- admin -->
    <div id="adminView" class="card p-3 mt-0 rounded-top-0 d-none">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Email</th><th>Name</th><th>Role</th><th class="text-end">Actions</th></tr></thead>
          <tbody id="userBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- employee modal -->
<div class="modal fade" id="empModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <form id="empForm">
      <div class="modal-header"><h5 class="modal-title" id="empModalTitle">Add employee</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body row g-2">
        <input type="hidden" name="id">
        <div class="col-6"><label class="form-label small">Full name *</label><input class="form-control" name="full_name" required></div>
        <div class="col-6"><label class="form-label small">Email *</label><input class="form-control" name="email" type="email" required></div>
        <div class="col-6"><label class="form-label small">Phone</label><input class="form-control" name="phone"></div>
        <div class="col-6"><label class="form-label small">Position</label><input class="form-control" name="position"></div>
        <div class="col-6"><label class="form-label small">Department</label><input class="form-control" name="department"></div>
        <div class="col-6"><label class="form-label small">Salary</label><input class="form-control" name="salary" type="number" step="0.01"></div>
        <div class="col-6"><label class="form-label small">Hire date</label><input class="form-control" name="hire_date" type="date"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary">Save</button></div>
    </form>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body></html>
