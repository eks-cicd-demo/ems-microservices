services:
  postgres:
    image: postgres:16-alpine
    container_name: ems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ems_user
      POSTGRES_PASSWORD: ems_password
      POSTGRES_DB: ems_db
    ports:
      - "5432:5432"
    volumes:
      - ems_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ems-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ems-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

  auth-service:
    build: ./auth-service
    container_name: ems-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://ems_user:ems_password@postgres:5432/ems_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

  employee-service:
    build: ./employee-service
    container_name: ems-employee-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://ems_user:ems_password@postgres:5432/ems_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

  admin-service:
    build: ./admin-service
    container_name: ems-admin-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://ems_user:ems_password@postgres:5432/ems_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

  dashboard-service:
    build: ./dashboard-service
    container_name: ems-dashboard-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://ems_user:ems_password@postgres:5432/ems_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ems-network

  gateway:
    build: ./gateway
    container_name: ems-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      EMPLOYEE_SERVICE_URL: http://employee-service:5002
      ADMIN_SERVICE_URL: http://admin-service:5003
      DASHBOARD_SERVICE_URL: http://dashboard-service:5004
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - employee-service
      - admin-service
      - dashboard-service
    networks:
      - ems-network

volumes:
  ems_pgdata:

networks:
  ems-network:
    driver: bridge

